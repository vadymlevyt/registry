<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
<title>АБ Левицького — Реєстр справ</title>
<script src="https://unpkg.com/react@18/umd/react.development.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<script src="https://accounts.google.com/gsi/client" async defer></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Unbounded:wght@400;600;700&family=Manrope:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg:         #0f1117;
    --surface:    #191c27;
    --surface2:   #222638;
    --border:     #2d3250;
    --accent:     #4f7cff;
    --accent2:    #7c5cfc;
    --red:        #ff4f6a;
    --orange:     #ff8c42;
    --green:      #3dd68c;
    --yellow:     #ffd166;
    --text:       #e8eaf0;
    --text2:      #8b90a7;
    --text3:      #555a73;
    --font-head:  'Unbounded', sans-serif;
    --font-body:  'Manrope', sans-serif;
    --radius:     12px;
    --radius-sm:  8px;
  }

  html, body { height: 100%; background: var(--bg); color: var(--text); font-family: var(--font-body); font-size: 14px; }
  #root { height: 100%; }

  /* scrollbar */
  ::-webkit-scrollbar { width: 4px; height: 4px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }

  /* layout */
  .app { display: flex; flex-direction: column; height: 100vh; overflow: hidden; }

  /* topbar */
  .topbar {
    display: flex; align-items: center; justify-content: space-between;
    padding: 0 20px; height: 56px; min-height: 56px;
    background: var(--surface); border-bottom: 1px solid var(--border);
    z-index: 100;
  }
  .topbar-logo { font-family: var(--font-head); font-size: 13px; font-weight: 700; letter-spacing: 0.05em; color: var(--text); }
  .topbar-logo span { color: var(--accent); }
  .topbar-right { display: flex; gap: 8px; align-items: center; }

  /* nav tabs */
  .nav { display: flex; gap: 2px; padding: 0 20px; background: var(--surface); border-bottom: 1px solid var(--border); }
  .nav-tab {
    padding: 10px 16px; font-size: 12px; font-weight: 600; letter-spacing: 0.04em;
    color: var(--text2); border: none; background: transparent; cursor: pointer;
    border-bottom: 2px solid transparent; transition: all 0.15s; white-space: nowrap;
  }
  .nav-tab:hover { color: var(--text); }
  .nav-tab.active { color: var(--accent); border-bottom-color: var(--accent); }

  /* main area */
  .main { flex: 1; overflow-y: auto; padding: 20px; }

  /* DASHBOARD */
  .dash-grid { display: grid; grid-template-columns: 1fr 340px; gap: 16px; }
  @media (max-width: 900px) { .dash-grid { grid-template-columns: 1fr; } }

  /* stat chips */
  .stats-row { display: flex; gap: 10px; margin-bottom: 16px; flex-wrap: wrap; }
  .stat-chip {
    display: flex; flex-direction: column; gap: 2px;
    padding: 12px 16px; background: var(--surface); border: 1px solid var(--border);
    border-radius: var(--radius-sm); min-width: 100px; flex: 1;
  }
  .stat-chip-val { font-family: var(--font-head); font-size: 22px; font-weight: 700; }
  .stat-chip-label { font-size: 11px; color: var(--text2); text-transform: uppercase; letter-spacing: 0.06em; }
  .stat-chip.red .stat-chip-val { color: var(--red); }
  .stat-chip.orange .stat-chip-val { color: var(--orange); }
  .stat-chip.blue .stat-chip-val { color: var(--accent); }
  .stat-chip.green .stat-chip-val { color: var(--green); }

  /* section title */
  .section-title {
    font-family: var(--font-head); font-size: 11px; font-weight: 600;
    letter-spacing: 0.1em; text-transform: uppercase; color: var(--text3);
    margin-bottom: 10px;
  }

  /* hot cases */
  .hot-case {
    display: flex; align-items: center; gap: 10px;
    padding: 10px 14px; background: var(--surface); border: 1px solid var(--border);
    border-radius: var(--radius-sm); margin-bottom: 8px; cursor: pointer;
    transition: border-color 0.15s, background 0.15s;
  }
  .hot-case:hover { border-color: var(--accent); background: var(--surface2); }
  .hot-case-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
  .hot-case-name { font-weight: 600; font-size: 13px; flex: 1; }
  .hot-case-meta { font-size: 11px; color: var(--text2); }
  .hot-case-days { font-family: var(--font-head); font-size: 11px; font-weight: 700; padding: 2px 8px; border-radius: 20px; }
  .days-red { background: rgba(255,79,106,0.15); color: var(--red); }
  .days-orange { background: rgba(255,140,66,0.15); color: var(--orange); }
  .days-yellow { background: rgba(255,209,102,0.15); color: var(--yellow); }
  .days-ok { background: rgba(61,214,140,0.12); color: var(--green); }

  /* CALENDAR */
  .cal-wrap { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 16px; }
  .cal-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 14px; }
  .cal-month { font-family: var(--font-head); font-size: 13px; font-weight: 700; }
  .cal-nav { display: flex; gap: 4px; }
  .cal-nav-btn {
    width: 28px; height: 28px; border-radius: var(--radius-sm); border: 1px solid var(--border);
    background: var(--surface2); color: var(--text2); cursor: pointer; display: flex;
    align-items: center; justify-content: center; font-size: 14px; transition: all 0.15s;
  }
  .cal-nav-btn:hover { border-color: var(--accent); color: var(--accent); }
  .cal-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 3px; }
  .cal-dow { text-align: center; font-size: 10px; font-weight: 600; color: var(--text3); padding: 4px 0; text-transform: uppercase; letter-spacing: 0.05em; }
  .cal-day {
    aspect-ratio: 1; display: flex; flex-direction: column; align-items: center; justify-content: center;
    border-radius: var(--radius-sm); font-size: 13px; cursor: pointer; position: relative;
    transition: all 0.12s; border: 1px solid transparent; gap: 2px; min-height: 36px;
  }
  .cal-day:hover { background: var(--surface2); border-color: var(--border); }
  .cal-day.today { background: rgba(79,124,255,0.12); border-color: rgba(79,124,255,0.4); color: var(--accent); font-weight: 700; }
  .cal-day.has-event::after { content: ''; width: 4px; height: 4px; border-radius: 50%; background: var(--accent); position: absolute; bottom: 3px; }
  .cal-day.has-event.urgent::after { background: var(--red); }
  .cal-day.other-month { color: var(--text3); }
  .cal-day.selected { background: var(--accent); color: white; border-color: var(--accent); }
  .cal-day.selected::after { background: white; }

  /* events list */
  .cal-events { margin-top: 12px; }
  .cal-event {
    display: flex; gap: 10px; align-items: flex-start;
    padding: 8px 12px; border-radius: var(--radius-sm); margin-bottom: 6px;
    background: var(--surface2); border-left: 3px solid var(--accent); cursor: pointer;
    transition: opacity 0.15s;
  }
  .cal-event:hover { opacity: 0.85; }
  .cal-event.urgent { border-left-color: var(--red); }
  .cal-event.deadline { border-left-color: var(--orange); }
  .cal-event-date { font-family: var(--font-head); font-size: 11px; color: var(--text2); min-width: 36px; padding-top: 1px; }
  .cal-event-name { font-weight: 600; font-size: 12px; }
  .cal-event-sub { font-size: 11px; color: var(--text2); }

  /* CASES GRID / TABLE */
  .cases-toolbar { display: flex; gap: 8px; margin-bottom: 16px; flex-wrap: wrap; align-items: center; }
  .search-box {
    display: flex; align-items: center; gap: 8px; flex: 1; min-width: 180px;
    background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius-sm);
    padding: 8px 12px;
  }
  .search-box input { background: transparent; border: none; outline: none; color: var(--text); font-family: var(--font-body); font-size: 13px; flex: 1; }
  .search-box input::placeholder { color: var(--text3); }
  .filter-btn {
    padding: 8px 14px; border-radius: var(--radius-sm); border: 1px solid var(--border);
    background: var(--surface); color: var(--text2); font-family: var(--font-body); font-size: 12px;
    font-weight: 600; cursor: pointer; transition: all 0.12s; white-space: nowrap;
  }
  .filter-btn:hover { border-color: var(--accent); color: var(--accent); }
  .filter-btn.active { background: rgba(79,124,255,0.12); border-color: var(--accent); color: var(--accent); }

  /* case cards grid */
  .cases-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 12px; }
  @media (max-width: 600px) { .cases-grid { grid-template-columns: 1fr; } }

  .case-card {
    background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius);
    padding: 16px; cursor: pointer; transition: all 0.15s; position: relative; overflow: hidden;
  }
  .case-card::before {
    content: ''; position: absolute; top: 0; left: 0; right: 0; height: 3px;
  }
  .case-card.cat-civil::before { background: var(--accent); }
  .case-card.cat-criminal::before { background: var(--red); }
  .case-card.cat-military::before { background: var(--orange); }
  .case-card.cat-admin::before { background: var(--green); }
  .case-card:hover { border-color: var(--accent); transform: translateY(-1px); box-shadow: 0 4px 20px rgba(0,0,0,0.3); }

  .case-card-top { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 10px; gap: 8px; }
  .case-card-name { font-family: var(--font-head); font-size: 13px; font-weight: 600; line-height: 1.3; }
  .case-card-badges { display: flex; gap: 4px; flex-wrap: wrap; }

  .badge {
    font-size: 10px; font-weight: 600; padding: 2px 7px; border-radius: 20px;
    letter-spacing: 0.04em; white-space: nowrap;
  }
  .badge-civil { background: rgba(79,124,255,0.15); color: var(--accent); }
  .badge-criminal { background: rgba(255,79,106,0.15); color: var(--red); }
  .badge-military { background: rgba(255,140,66,0.15); color: var(--orange); }
  .badge-admin { background: rgba(61,214,140,0.12); color: var(--green); }
  .badge-active { background: rgba(61,214,140,0.12); color: var(--green); }
  .badge-paused { background: rgba(139,144,167,0.15); color: var(--text2); }
  .badge-closed { background: rgba(85,90,115,0.2); color: var(--text3); }

  .case-card-rows { display: flex; flex-direction: column; gap: 5px; }
  .case-row { display: flex; gap: 6px; align-items: center; font-size: 12px; }
  .case-row-icon { color: var(--text3); flex-shrink: 0; font-size: 12px; }
  .case-row-label { color: var(--text2); min-width: 0; }
  .case-row-val { color: var(--text); font-weight: 500; }
  .case-row-val.urgent { color: var(--red); font-weight: 700; }
  .case-row-val.warn { color: var(--orange); font-weight: 600; }

  .case-card-actions { display: flex; gap: 6px; margin-top: 12px; }
  .btn-sm {
    padding: 5px 10px; border-radius: var(--radius-sm); font-size: 11px; font-weight: 600;
    cursor: pointer; border: none; font-family: var(--font-body); transition: all 0.12s;
  }
  .btn-primary { background: var(--accent); color: white; }
  .btn-primary:hover { background: #6b93ff; }
  .btn-ghost { background: var(--surface2); color: var(--text2); border: 1px solid var(--border); }
  .btn-ghost:hover { border-color: var(--accent); color: var(--accent); }

  /* CASE DETAIL MODAL */
  .modal-overlay {
    position: fixed; inset: 0; background: rgba(0,0,0,0.7); z-index: 200;
    display: flex; align-items: flex-start; justify-content: flex-end;
    backdrop-filter: blur(2px);
  }
  .modal-panel {
    width: min(520px, 100vw); height: 100vh; background: var(--surface);
    border-left: 1px solid var(--border); overflow-y: auto; padding: 24px;
    animation: slideIn 0.2s ease;
  }
  @keyframes slideIn { from { transform: translateX(40px); opacity: 0; } to { transform: translateX(0); opacity: 1; } }
  .modal-close {
    width: 32px; height: 32px; border-radius: var(--radius-sm); border: 1px solid var(--border);
    background: var(--surface2); color: var(--text2); cursor: pointer; font-size: 16px;
    display: flex; align-items: center; justify-content: center; float: right; transition: all 0.12s;
  }
  .modal-close:hover { border-color: var(--red); color: var(--red); }
  .modal-title { font-family: var(--font-head); font-size: 16px; font-weight: 700; margin-bottom: 4px; margin-right: 40px; line-height: 1.3; }
  .modal-sub { font-size: 12px; color: var(--text2); margin-bottom: 16px; }
  .modal-section { margin-bottom: 20px; }
  .modal-section-title { font-size: 10px; font-weight: 700; letter-spacing: 0.1em; text-transform: uppercase; color: var(--text3); margin-bottom: 8px; }
  .modal-field { display: flex; gap: 8px; padding: 7px 0; border-bottom: 1px solid var(--border); align-items: flex-start; }
  .modal-field:last-child { border-bottom: none; }
  .modal-field-label { font-size: 11px; color: var(--text2); min-width: 130px; flex-shrink: 0; padding-top: 1px; }
  .modal-field-val { font-size: 13px; font-weight: 500; }
  .modal-field-val.urgent { color: var(--red); }
  .modal-field-val.warn { color: var(--orange); }
  .modal-actions { display: flex; gap: 8px; flex-wrap: wrap; margin-top: 20px; }
  .btn-lg { padding: 10px 18px; border-radius: var(--radius-sm); font-size: 13px; font-weight: 600; cursor: pointer; border: none; font-family: var(--font-body); transition: all 0.12s; }
  .btn-lg.primary { background: var(--accent); color: white; }
  .btn-lg.primary:hover { background: #6b93ff; }
  .btn-lg.secondary { background: var(--surface2); color: var(--text2); border: 1px solid var(--border); }
  .btn-lg.secondary:hover { border-color: var(--accent); color: var(--accent); }
  .btn-lg.danger { background: rgba(255,79,106,0.12); color: var(--red); border: 1px solid rgba(255,79,106,0.3); }

  /* Quick Input */
  .qi-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.6); z-index: 300; display: flex; align-items: flex-end; justify-content: center; backdrop-filter: blur(2px); }
  .qi-panel {
    width: min(600px, 100vw); background: var(--surface); border: 1px solid var(--border);
    border-bottom: none; border-radius: var(--radius) var(--radius) 0 0; padding: 20px;
    animation: slideUp 0.2s ease;
  }
  @keyframes slideUp { from { transform: translateY(20px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
  .qi-title { font-family: var(--font-head); font-size: 13px; font-weight: 700; margin-bottom: 12px; display: flex; align-items: center; gap: 8px; }
  .qi-textarea {
    width: 100%; min-height: 100px; background: var(--surface2); border: 1px solid var(--border);
    border-radius: var(--radius-sm); color: var(--text); font-family: var(--font-body); font-size: 13px;
    padding: 12px; resize: none; outline: none; transition: border-color 0.15s;
  }
  .qi-textarea:focus { border-color: var(--accent); }
  .qi-textarea::placeholder { color: var(--text3); }
  .qi-row { display: flex; gap: 8px; margin-top: 10px; align-items: center; flex-wrap: wrap; }
  .qi-hint { font-size: 11px; color: var(--text3); flex: 1; }
  .qi-result {
    margin-top: 12px; padding: 12px; background: rgba(79,124,255,0.08);
    border: 1px solid rgba(79,124,255,0.25); border-radius: var(--radius-sm);
  }
  .qi-result-title { font-size: 12px; font-weight: 600; color: var(--accent); margin-bottom: 6px; }
  .qi-result-text { font-size: 13px; line-height: 1.5; }
  .qi-result-actions { display: flex; gap: 6px; margin-top: 10px; }

  /* Analysis panel */
  .analysis-panel { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 20px; max-width: 680px; }
  .analysis-msgs { max-height: 320px; overflow-y: auto; display: flex; flex-direction: column; gap: 10px; margin-bottom: 14px; padding-right: 4px; }
  .analysis-msg { padding: 10px 14px; border-radius: var(--radius-sm); font-size: 13px; line-height: 1.6; max-width: 92%; }
  .analysis-msg.ai { background: var(--surface2); border: 1px solid var(--border); align-self: flex-start; }
  .analysis-msg.ai.insight { border-left: 3px solid var(--accent); }
  .analysis-msg.user { background: rgba(79,124,255,0.08); border: 1px solid rgba(79,124,255,0.2); align-self: flex-end; }
  .analysis-msg.saved { background: rgba(61,214,140,0.08); border: 1px solid rgba(61,214,140,0.2); align-self: flex-start; font-size: 12px; color: var(--text2); }
  .analysis-stats { display: grid; grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); gap: 10px; margin-bottom: 18px; }
  .analysis-stat { background: var(--surface2); border: 1px solid var(--border); border-radius: var(--radius-sm); padding: 12px; }
  .analysis-stat-val { font-family: var(--font-head); font-size: 22px; font-weight: 700; color: var(--accent); }
  .analysis-stat-lbl { font-size: 10px; color: var(--text2); text-transform: uppercase; letter-spacing: 0.06em; margin-top: 2px; }
  .ideas-list { margin-top: 14px; border-top: 1px solid var(--border); padding-top: 14px; }
  .idea-item { display: flex; gap: 10px; padding: 8px 12px; background: var(--surface2); border-radius: var(--radius-sm); margin-bottom: 6px; font-size: 12px; align-items: flex-start; }
  .idea-dot { width: 6px; height: 6px; border-radius: 50%; background: var(--accent); margin-top: 5px; flex-shrink: 0; }

  /* FAB */
  .fab {
    position: fixed; bottom: 24px; right: 24px; width: 52px; height: 52px;
    border-radius: 50%; background: var(--accent); border: none; color: white;
    font-size: 22px; cursor: pointer; box-shadow: 0 4px 20px rgba(79,124,255,0.4);
    display: flex; align-items: center; justify-content: center; z-index: 150;
    transition: transform 0.15s, box-shadow 0.15s;
  }
  .fab:hover { transform: scale(1.08); box-shadow: 0 6px 28px rgba(79,124,255,0.55); }

  /* Intake / Add case form */
  .form-panel { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 22px; max-width: 760px; }
  .form-title { font-family: var(--font-head); font-size: 15px; font-weight: 700; margin-bottom: 4px; }
  .form-desc { font-size: 11px; color: var(--text2); margin-bottom: 20px; }
  .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }
  @media (max-width: 500px) { .form-grid { grid-template-columns: 1fr; } }
  .form-group { display: flex; flex-direction: column; gap: 5px; }
  .form-group.full { grid-column: 1 / -1; }
  .form-label { font-size: 11px; font-weight: 600; color: var(--text2); text-transform: uppercase; letter-spacing: 0.06em; }
  .form-input, .form-select, .form-textarea {
    background: var(--surface2); border: 1px solid var(--border); border-radius: var(--radius-sm);
    color: var(--text); font-family: var(--font-body); font-size: 13px; padding: 9px 12px;
    outline: none; transition: border-color 0.15s; width: 100%;
  }
  .form-input:focus, .form-select:focus, .form-textarea:focus { border-color: var(--accent); }
  .form-select option { background: var(--surface2); }
  .form-textarea { min-height: 80px; resize: vertical; }
  .form-actions { display: flex; gap: 10px; margin-top: 20px; flex-wrap: wrap; align-items: center; }
  .form-divider { height: 1px; background: var(--border); margin: 18px 0; }
  .form-section-label { font-size: 10px; font-weight: 600; letter-spacing: 0.12em; text-transform: uppercase; color: var(--text3); margin-bottom: 12px; }
  /* AI chat */
  .ai-chat { background: var(--surface2); border: 1px solid var(--border); border-radius: var(--radius-sm); padding: 14px; margin-bottom: 16px; }
  .ai-chat-label { font-size: 10px; font-weight: 600; letter-spacing: 0.1em; text-transform: uppercase; color: var(--text3); margin-bottom: 10px; }
  .ai-msgs { max-height: 160px; overflow-y: auto; display: flex; flex-direction: column; gap: 8px; margin-bottom: 10px; }
  .ai-msg { padding: 8px 12px; border-radius: var(--radius-sm); font-size: 12px; line-height: 1.5; max-width: 88%; }
  .ai-msg.ai { background: var(--surface); border: 1px solid var(--border); align-self: flex-start; }
  .ai-msg.user { background: rgba(79,124,255,0.1); border: 1px solid rgba(79,124,255,0.2); align-self: flex-end; }
  .ai-input-row { display: flex; gap: 8px; }
  .ai-input { flex: 1; background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius-sm); color: var(--text); font-family: var(--font-body); font-size: 12px; padding: 7px 12px; outline: none; transition: border-color 0.15s; }
  .ai-input:focus { border-color: var(--accent); }
  .ai-input::placeholder { color: var(--text3); }
  /* upload zone */
  .upload-zone { border: 1.5px dashed var(--border); border-radius: var(--radius-sm); padding: 18px 16px; margin-bottom: 20px; display: flex; flex-direction: column; align-items: center; gap: 6px; cursor: pointer; transition: all 0.15s; text-align: center; }
  .upload-zone:hover { border-color: var(--accent); background: rgba(79,124,255,0.04); }
  .upload-zone-icon { font-size: 24px; opacity: 0.4; }
  .upload-zone-text { font-size: 12px; color: var(--text2); }
  .upload-zone-hint { font-size: 11px; color: var(--text3); }
  .upload-zone-btns { display: flex; gap: 8px; margin-top: 8px; flex-wrap: wrap; justify-content: center; }

  /* empty state */
  .empty { text-align: center; padding: 60px 20px; color: var(--text2); }
  .empty-icon { font-size: 40px; margin-bottom: 12px; opacity: 0.4; }
  .empty-text { font-size: 14px; }

function daysUntil(dateStr) {

function urgencyClass(days) {
  if (days === null) return null;
  if (days < 0) return 'urgent';
  if (days <= 3) return 'urgent';
  if (days <= 7) return 'warn';
  return null;
}

function daysChipClass(days) {

function Calendar({ cases, onSelectCase }) {
  const [viewDate, setViewDate] = useState(new Date(today.getFullYear(), today.getMonth(), 1));
  const [selected, setSelected] = useState(null);
  const openCase = (c) => { usageLog.log('open_case', {name: c.name}); setSelected(c); };

  const year = viewDate.getFullYear();
  const month = viewDate.getMonth();
  const firstDay = new Date(year, month, 1).getDay();
  const daysInMonth = new Date(year, month + 1, 0).getDate();
  const startOffset = firstDay === 0 ? 6 : firstDay - 1;

  const eventsByDate = useMemo(() => {
    const map = {};
    cases.forEach(c => {
      if (c.hearing_date) {
        if (!map[c.hearing_date]) map[c.hearing_date] = [];
        map[c.hearing_date].push({ ...c, eventType:'hearing' });
      }
      if (c.deadline) {
        if (!map[c.deadline]) map[c.deadline] = [];
        map[c.deadline].push({ ...c, eventType:'deadline' });
      }
    });
    return map;
  }, [cases]);

  const cells = [];
  for (let i = 0; i < startOffset; i++) cells.push(null);
  for (let d = 1; d <= daysInMonth; d++) cells.push(d);

  const monthStr = viewDate.toLocaleDateString('uk-UA', { month:'long', year:'numeric' });

  const selectedDateStr = selected ? `${year}-${String(month+1).padStart(2,'0')}-${String(selected).padStart(2,'0')}` : null;
  const selectedEvents = selectedDateStr ? (eventsByDate[selectedDateStr] || []) : [];

  // upcoming events this month
  const upcomingEvents = useMemo(() => {
    return Object.entries(eventsByDate)
      .filter(([date]) => {
        const d = new Date(date);
        return d.getFullYear() === year && d.getMonth() === month;
      })
      .sort(([a],[b]) => a.localeCompare(b))
      .flatMap(([date, evts]) => evts.map(e => ({...e, date})))
      .slice(0, 8);
  }, [eventsByDate, year, month]);

  return (
    <div>
      <div className="cal-wrap">
        <div className="cal-header">
          <div className="cal-month" style={{textTransform:'capitalize'}}>{monthStr}</div>
          <div className="cal-nav">
            <button className="cal-nav-btn" onClick={() => setViewDate(new Date(year, month-1, 1))}>‹</button>
            <button className="cal-nav-btn" onClick={() => { setViewDate(new Date(today.getFullYear(), today.getMonth(), 1)); setSelected(null); }}>●</button>
            <button className="cal-nav-btn" onClick={() => setViewDate(new Date(year, month+1, 1))}>›</button>
          </div>
        </div>
        <div className="cal-grid">
          {['Пн','Вт','Ср','Чт','Пт','Сб','Нд'].map(d => <div key={d} className="cal-dow">{d}</div>)}
          {cells.map((day, i) => {
            if (!day) return <div key={`e${i}`} />;
            const dateStr = `${year}-${String(month+1).padStart(2,'0')}-${String(day).padStart(2,'0')}`;
            const evts = eventsByDate[dateStr] || [];
            const isToday = day === today.getDate() && month === today.getMonth() && year === today.getFullYear();
            const isUrgent = evts.some(e => daysUntil(dateStr) !== null && daysUntil(dateStr) <= 3);
            return (
              <div key={day}
                className={`cal-day${isToday?' today':''}${evts.length?' has-event':''}${isUrgent?' urgent':''}${selected===day?' selected':''}`}
                onClick={() => setSelected(selected===day ? null : day)}>
                {day}
              </div>
            );
          })}
        </div>

        {selected && selectedEvents.length > 0 && (
          <div className="cal-events" style={{marginTop:12}}>
            <div className="section-title" style={{marginBottom:8}}>
              {new Date(selectedDateStr).toLocaleDateString('uk-UA', {day:'2-digit',month:'long'})}
            </div>
            {selectedEvents.map((e,i) => (
              <div key={i} className={`cal-event${e.eventType==='deadline'?' deadline':''}`}
                onClick={() => onSelectCase(e)}>
                <div>
                  <div className="cal-event-name">{e.name}</div>
                  <div className="cal-event-sub">{e.eventType==='hearing'?'Засідання':'Дедлайн'} · {e.court}</div>
                </div>
              </div>
            ))}
          </div>
        )}
      </div>


    </div>
  );
}

// Pipeline: detectInputType
function detectInputType(input) {
  if (typeof input === 'string') return 'text';
  if (input instanceof File) {
    const ext = input.name.split('.').pop().toLowerCase();
    if (['jpg','jpeg','png','webp'].includes(ext)) return 'image';
    if (ext === 'heic') return 'heic';
    if (ext === 'pdf') return 'pdf';
    if (['txt','md'].includes(ext)) return 'text_file';
    return 'unsupported';
  }
  return 'unknown';
}

// Pipeline: extractTextFromInput (local, no LLM)
async function extractTextFromInput(input) {
  const type = detectInputType(input);

  if (type === 'text') return { text: input, sourceType: 'text', imageData: null };

  if (type === 'text_file') {
    return new Promise((resolve) => {
      const reader = new FileReader();
      reader.onload = (e) => resolve({ text: e.target.result, sourceType: 'file', imageData: null });
      reader.onerror = () => resolve({ text: null, sourceType: 'file', imageData: null, error: 'extraction_failed' });
      reader.readAsText(input);
    });
  }

  if (type === 'image') {
    return new Promise((resolve) => {
      const reader = new FileReader();
      reader.onload = (e) => {
        const base64 = e.target.result.split(',')[1];
        resolve({ text: null, sourceType: 'image', imageData: { base64, mediaType: input.type || 'image/jpeg' } });
      };
      reader.onerror = () => resolve({ text: null, sourceType: 'image', imageData: null, error: 'extraction_failed' });
      reader.readAsDataURL(input);
    });
  }

  if (type === 'pdf') {
    if (window.pdfjsLib) {
      try {
        const arrayBuffer = await input.arrayBuffer();
        const pdf = await window.pdfjsLib.getDocument({ data: arrayBuffer }).promise;
        let fullText = '';
        for (let i = 1; i <= pdf.numPages; i++) {
          const page = await pdf.getPage(i);
          const tc = await page.getTextContent();
          fullText += tc.items.map(s => s.str).join(' ') + '\n';
        }
        if (fullText.trim()) return { text: fullText, sourceType: 'pdf', imageData: null };
        // Scanned PDF — render first page as image
        const page = await pdf.getPage(1);
        const viewport = page.getViewport({ scale: 2.0 });
        const canvas = document.createElement('canvas');
        canvas.width = viewport.width; canvas.height = viewport.height;
        await page.render({ canvasContext: canvas.getContext('2d'), viewport }).promise;
        const base64 = canvas.toDataURL('image/jpeg', 0.85).split(',')[1];
        return { text: null, sourceType: 'pdf', imageData: { base64, mediaType: 'image/jpeg' } };
      } catch(e) {
        return { text: null, sourceType: 'pdf', imageData: null, error: 'extraction_failed' };
      }
    }
    return { text: null, sourceType: 'pdf', imageData: null, error: 'unsupported_format' };
  }

  if (type === 'heic' || type === 'unsupported') {
    return { text: null, sourceType: 'file', imageData: null, error: 'unsupported_format' };
  }

  return { text: null, sourceType: 'unknown', imageData: null, error: 'unsupported_format' };
}

// Pipeline: normalizeExtractedText
function normalizeExtractedText(text) {
  if (!text) return '';
  return text.trim().replace(/\s+/g, ' ').slice(0, 8000);
}

// Pipeline: analyzeWithLLM
async function analyzeWithLLM(text, imageData, mediaType, cases, apiKey) {
  const caseNames = cases.map(c => c.name).join(', ');
  const systemPrompt = QUICK_INPUT_SYSTEM_PROMPT + '\n\nExisting cases in the registry: ' + caseNames;

  const messages = imageData
    ? [{ role: 'user', content: [
        { type: 'image', source: { type: 'base64', media_type: mediaType || 'image/jpeg', data: imageData } },
        { type: 'text', text: 'Analyze this legal document.' }
      ]}]
    : [{ role: 'user', content: text }];

  const res = await fetch('https://api.anthropic.com/v1/messages', {
    method: 'POST',
    headers: {
      'Content-Type': 'application/json',
      'x-api-key': apiKey,
      'anthropic-version': '2023-06-01',
      'anthropic-dangerous-direct-browser-access': 'true'
    },
    body: JSON.stringify({ model: 'claude-haiku-4-5-20251001', max_tokens: 1000, system: systemPrompt, messages })
  });

  if (!res.ok) {
    const data = await res.json();
    throw new Error(data?.error?.message || `API error: ${res.status}`);
  }
  const data = await res.json();
  return data?.content?.[0]?.text || '';
}

// Pipeline: validateJSON
function validateJSON(raw) {
  try { return JSON.parse(raw); } catch(e) {}
  try {
    const m = raw.match(/\{[\s\S]*\}/);
    if (m) return JSON.parse(m[0]);
  } catch(e) {}
  return {
    input_type: 'unknown', source_type: 'text', processing_status: 'failed',
    case_match: { found: false, case_name: null, confidence: 0 },
    extracted: { case_number: null, court: null, judge: null, hearing_date: null, hearing_time: null, deadlines: [], person: null },
    recommended_actions: ['save_note'],
    human_message: 'Не вдалося розібрати відповідь. Збережіть як нотатку.',
    warnings: [], confidence: 0, needs_review: true
  };
}

// Scenario registry — modular, each scenario is independent
const scenario_subpoena = {
  name: 'subpoena',
  matches: (r) => r.input_type === 'subpoena' || !!(r.extracted && r.extracted.hearing_date),
  getActions: (r) => {
    const actions = [];
    if (r.extracted?.hearing_date) {
      const timeStr = r.extracted.hearing_time ? ' о ' + r.extracted.hearing_time : '';
      actions.push({ id: 'update_case_date', label: 'Оновити дату засідання: ' + r.extracted.hearing_date + timeStr, type: 'primary' });
    }
    actions.push({ id: 'create_hearing_event', label: 'Створити подію в календарі', type: 'secondary' });
    return actions;
  }
};

const scenario_existing_case = {
  name: 'existing_case',
  matches: (r) => r.case_match?.found === true,
  getActions: (r) => [{ id: 'save_to_drive', label: 'Зберегти до справи «' + r.case_match.case_name + '»', type: 'primary' }]
};

const scenario_new_case = {
  name: 'new_case',
  matches: (r) => r.input_type === 'new_case' || (r.case_match?.found === false && r.input_type !== 'note' && r.input_type !== 'unknown'),
  getActions: () => [{ id: 'create_case', label: 'Створити нову справу', type: 'primary' }]
};

const scenario_multiple_files = {
  name: 'multiple_files',
  matches: (r, files) => !!(files && files.length >= 2),
  getActions: () => [{ id: 'save_to_drive', label: 'Зберегти всі файли', type: 'primary' }]
};

const scenario_note = {
  name: 'note',
  matches: () => true, // fallback
  getActions: () => [{ id: 'save_note', label: 'Зберегти як нотатку', type: 'secondary' }]
};

const SCENARIO_REGISTRY = [
  scenario_subpoena,
  scenario_existing_case,
  scenario_new_case,
  scenario_multiple_files,
  scenario_note,
];

function collectScenarioActions(result, files) {
  const nonFallback = SCENARIO_REGISTRY.slice(0, -1);
  const anyNonFallbackMatched = nonFallback.some(s => s.matches(result, files));
  const useFallback = !anyNonFallbackMatched || result.confidence < 0.5 || result.processing_status === 'failed';

  const active = SCENARIO_REGISTRY.filter((s, i) => {
    if (s.name === 'note') return useFallback;
    return s.matches(result, files);
  });

  const seen = new Set();
  return active.flatMap(s => s.getActions(result, files)).filter(a => {
    if (seen.has(a.id)) return false;
    seen.add(a.id);
    return true;
  });
}

const QI_ERROR_MESSAGES = {
  unsupported_format: 'Формат файлу не підтримується. Оберіть .txt, .md, .pdf, .jpg, .png або .webp.',
  extraction_failed: 'Не вдалося витягти текст з файлу.',
  llm_failed: 'API не відповів. Перевірте ключ або спробуйте ще раз.',
  invalid_json: 'Модель повернула некоректний формат. Збережіть як нотатку.',
  low_confidence: 'Низька впевненість в аналізі. Перевірте результат.',
};

// ── QUICK INPUT ───────────────────────────────────────────────────────────────
function QuickInput({ cases, setCases, onClose }) {
  const [text, setText] = useState('');
  const [files, setFiles] = useState([]);
  const [result, setResult] = useState(null);  // parsed JSON from LLM
  const [qiError, setQiError] = useState(null); // { category, message }
  const [loading, setLoading] = useState(false);
  const [dragOver, setDragOver] = useState(false);
  const [doneAction, setDoneAction] = useState(null);
  const fileInputRef = React.useRef(null);
  const apiKey = localStorage.getItem('claude_api_key') || '';

  React.useEffect(() => { usageLog.log('quick_input'); }, []);

  const addFile = (file) => {
    if (!file) return;
    setFiles(prev => [...prev, file]);
    const ext = file.name.split('.').pop().toLowerCase();
    if (['txt','md'].includes(ext)) {
      const reader = new FileReader();
      reader.onload = (e) => setText(e.target.result);
      reader.readAsText(file);
    }
  };

  const onDragOver = (e) => { e.preventDefault(); setDragOver(true); };
  const onDragLeave = () => setDragOver(false);
  const onDrop = (e) => {
    e.preventDefault(); setDragOver(false);
    if (e.dataTransfer.files) Array.from(e.dataTransfer.files).forEach(addFile);
  };

  const reset = () => { setResult(null); setQiError(null); setDoneAction(null); };

  // "📝 Нотатка" — bypass pipeline, save directly
  const saveNote = () => {
    const content = text.trim() || (files.length > 0 ? '[Файл: ' + files.map(f=>f.name).join(', ') + ']' : '');
    if (!content) { onClose(); return; }
    usageLog.saveIdea('[Нотатка Quick Input] ' + content.slice(0, 200));
    usageLog.log('quick_input_note', { length: content.length });
    alert('Нотатку збережено');
    onClose();
  };

  const executeAction = (actionId) => {
    if (actionId === 'save_note') { saveNote(); return; }
    if (actionId === 'update_case_date' && result?.extracted?.hearing_date && result?.case_match?.found) {
      setCases(prev => prev.map(c => {
        if (c.name.toLowerCase() === (result.case_match.case_name || '').toLowerCase()) {
          return { ...c, hearing_date: result.extracted.hearing_date, ...(result.extracted.hearing_time && { hearing_time: result.extracted.hearing_time }) };
        }
        return c;
      }));
    }
    setDoneAction(actionId);
  };

  const analyze = async () => {
    // SYSTEM_IMPORT bypass
    if (text.trim().startsWith('===SYSTEM_IMPORT===')) {
      const data = {};
      text.split('\n').forEach(line => { const m = line.match(/^(\w+):\s*(.+)$/); if (m) data[m[1].trim()] = m[2].trim(); });
      const caseName = data.name || '';
      setCases(prev => {
        const existing = prev.find(c => c.name.toLowerCase() === caseName.toLowerCase());
        if (existing) return prev.map(c => c.id === existing.id ? { ...c, ...data, id: c.id } : c);
        return [...prev, { id: Date.now(), name: caseName, client: data.client||'', category: data.category||'civil', status: 'active', court: data.court||'', case_no: data.case_no||'', hearing_date: data.hearing_date||'', hearing_time: data.hearing_time||'', deadline: data.deadline||'', deadline_type: data.deadline_type||'', next_action: data.next_action||'', notes: data.notes||'' }];
      });
      alert('Дані внесено: ' + caseName);
      onClose();
      return;
    }

    const inputText = text.trim();
    if (!inputText && files.length === 0) return;
    if (!apiKey) { setQiError({ category: 'llm_failed', message: 'API ключ не налаштовано. Додайте у розділі Аналіз системи.' }); return; }

    setLoading(true); setQiError(null); setResult(null);

    try {
      const source = files.length > 0 ? files[0] : inputText;
      const extracted = await extractTextFromInput(source);

      if (extracted.error) {
        setQiError({ category: extracted.error, message: QI_ERROR_MESSAGES[extracted.error] || extracted.error });
        setLoading(false); return;
      }

      const normalText = normalizeExtractedText(extracted.text || inputText);

      let rawResponse;
      try {
        rawResponse = await analyzeWithLLM(normalText, extracted.imageData?.base64, extracted.imageData?.mediaType, cases, apiKey);
      } catch(e) {
        setQiError({ category: 'llm_failed', message: QI_ERROR_MESSAGES.llm_failed + ' ' + e.message });
        setLoading(false); return;
      }

      const parsed = validateJSON(rawResponse);
      if (parsed.confidence < 0.5 && parsed.processing_status !== 'failed') {
        parsed.warnings = [...(parsed.warnings || []), QI_ERROR_MESSAGES.low_confidence];
        parsed.needs_review = true;
      }
      setResult(parsed);
    } catch(e) {
      setQiError({ category: 'llm_failed', message: e.message || QI_ERROR_MESSAGES.llm_failed });
    }
    setLoading(false);
  };

  const actions = result ? collectScenarioActions(result, files) : [];

  const typeIcon = (t) => ({ subpoena:'📅', new_case:'🆕', document:'📄', note:'📝' }[t] || '🔍');
  const typeLabel = (t) => ({ subpoena:'Повістка', new_case:'Нова справа', document:'Документ', note:'Нотатка' }[t] || 'Аналіз');
  const actionIcon = (id) => ({ update_case_date:'📅', create_hearing_event:'📆', save_to_drive:'📁', create_case:'🆕', save_note:'📝' }[id] || '✅');

  return (
    <div className="qi-overlay" onClick={onClose}>
      <div
        className="qi-panel"
        onClick={e => e.stopPropagation()}
        onDragOver={onDragOver}
        onDragLeave={onDragLeave}
        onDrop={onDrop}
        style={dragOver ? { outline: '2px solid var(--accent)', background: 'var(--surface2)' } : {}}
      >
        <div className="qi-title">
          <span>⚡</span> Quick Input
        </div>

        <input ref={fileInputRef} type="file" accept="*" multiple style={{display:'none'}} onChange={e => Array.from(e.target.files).forEach(addFile)} />

        {!result && (
          <>
            <textarea
              className="qi-textarea"
              placeholder="Вставте текст повістки з Viber, напишіть повідомлення від клієнта, або введіть будь-яку інформацію по справі..."
              value={text}
              onChange={e => setText(e.target.value)}
              autoFocus
            />
            {files.length > 0 && (
              <div style={{marginTop:8,display:'flex',gap:6,flexWrap:'wrap'}}>
                {files.map((f,i) => (
                  <span key={i} style={{fontSize:11,background:'var(--surface2)',border:'1px solid var(--border)',borderRadius:6,padding:'3px 8px',color:'var(--text2)',display:'flex',alignItems:'center',gap:6}}>
                    📎 {f.name}
                    <button onClick={() => setFiles(prev => prev.filter((_,j)=>j!==i))} style={{background:'none',border:'none',color:'var(--text3)',cursor:'pointer',padding:0,fontSize:12,lineHeight:1}}>✕</button>
                  </span>
                ))}
              </div>
            )}
          </>
        )}

        {qiError && (
          <div className="qi-result" style={{borderColor:'var(--red)',marginTop:12}}>
            <div className="qi-result-title" style={{color:'var(--red)'}}>
              ⚠️ {qiError.category==='unsupported_format'?'Формат не підтримується':qiError.category==='extraction_failed'?'Помилка читання файлу':'Помилка API'}
            </div>
            <div className="qi-result-text" style={{fontSize:12}}>{qiError.message}</div>
            <div className="qi-result-actions">
              <button className="btn-sm btn-ghost" onClick={saveNote}>📝 Зберегти як нотатку</button>
              <button className="btn-sm btn-ghost" onClick={() => setQiError(null)}>Закрити</button>
            </div>
          </div>
        )}

        {result && !qiError && (
          <div className="qi-result">
            <div className="qi-result-title">
              {typeIcon(result.input_type)} {typeLabel(result.input_type)}
              {result.needs_review && <span style={{marginLeft:8,color:'var(--orange)',fontSize:11}}>⚠️ Потребує перевірки</span>}
            </div>
            <div className="qi-result-text" style={{marginBottom:10}}>{result.human_message}</div>

            {/* Extracted data card */}
            {result.extracted && Object.entries(result.extracted).some(([k,v]) => v !== null && (!Array.isArray(v) || v.length > 0)) && (
              <div style={{background:'var(--surface)',border:'1px solid var(--border)',borderRadius:'var(--radius-sm)',padding:'10px 12px',marginBottom:10,fontSize:12}}>
                <div style={{fontSize:10,fontWeight:700,letterSpacing:'0.08em',textTransform:'uppercase',color:'var(--text3)',marginBottom:8}}>Витягнуті дані</div>
                {result.case_match?.found && (
                  <div style={{display:'flex',gap:8,marginBottom:5}}>
                    <span style={{color:'var(--text2)',minWidth:110}}>Справа:</span>
                    <span style={{fontWeight:600,color:'var(--green)'}}>{result.case_match.case_name} <span style={{color:'var(--text3)',fontWeight:400}}>({Math.round((result.case_match.confidence||0)*100)}%)</span></span>
                  </div>
                )}
                {result.extracted.case_number && <div style={{display:'flex',gap:8,marginBottom:5}}><span style={{color:'var(--text2)',minWidth:110}}>Номер справи:</span><span>{result.extracted.case_number}</span></div>}
                {result.extracted.court && <div style={{display:'flex',gap:8,marginBottom:5}}><span style={{color:'var(--text2)',minWidth:110}}>Суд:</span><span>{result.extracted.court}</span></div>}
                {result.extracted.judge && <div style={{display:'flex',gap:8,marginBottom:5}}><span style={{color:'var(--text2)',minWidth:110}}>Суддя:</span><span>{result.extracted.judge}</span></div>}
                {result.extracted.hearing_date && (
                  <div style={{display:'flex',gap:8,marginBottom:5}}>
                    <span style={{color:'var(--text2)',minWidth:110}}>Дата засідання:</span>
                    <span style={{color:'var(--accent)',fontWeight:600}}>{result.extracted.hearing_date}{result.extracted.hearing_time ? ' о ' + result.extracted.hearing_time : ''}</span>
                  </div>
                )}
                {result.extracted.person && <div style={{display:'flex',gap:8,marginBottom:5}}><span style={{color:'var(--text2)',minWidth:110}}>Особа:</span><span>{result.extracted.person}</span></div>}
                {result.extracted.deadlines?.length > 0 && <div style={{display:'flex',gap:8}}><span style={{color:'var(--text2)',minWidth:110}}>Дедлайни:</span><span>{result.extracted.deadlines.join(', ')}</span></div>}
              </div>
            )}

            {/* Warnings */}
            {result.warnings?.length > 0 && (
              <div style={{background:'rgba(255,140,66,0.08)',border:'1px solid rgba(255,140,66,0.25)',borderRadius:'var(--radius-sm)',padding:'8px 12px',marginBottom:10,fontSize:12,color:'var(--orange)'}}>
                {result.warnings.map((w,i) => <div key={i}>⚠ {w}</div>)}
              </div>
            )}

            {/* Confirmed action feedback */}
            {doneAction && (
              <div style={{background:'rgba(61,214,140,0.08)',border:'1px solid rgba(61,214,140,0.2)',borderRadius:'var(--radius-sm)',padding:'8px 12px',marginBottom:10,fontSize:12,color:'var(--green)'}}>
                ✅ Дію виконано
              </div>
            )}

            {/* Action buttons from scenarios */}
            <div className="qi-result-actions" style={{flexWrap:'wrap',gap:6}}>
              {actions.map(a => (
                <button
                  key={a.id}
                  className={`btn-sm ${a.type==='primary'?'btn-primary':'btn-ghost'}`}
                  onClick={() => executeAction(a.id)}
                  disabled={!!doneAction}
                >
                  {actionIcon(a.id)} {a.label}
                </button>
              ))}
              <button className="btn-sm btn-ghost" onClick={reset}>← Назад</button>
            </div>
          </div>
        )}

        <div className="qi-row">
          {!result && <button className="btn-sm btn-ghost" onClick={() => fileInputRef.current.click()}>📎 Файл</button>}
          {!result && (
            <button className="btn-sm btn-ghost" style={{borderColor:'rgba(61,214,140,0.3)',color:'var(--green)'}} onClick={saveNote}>
              📝 Нотатка
            </button>
          )}
          <button className="btn-sm btn-ghost" onClick={onClose}>Закрити</button>
          {!result && (
            apiKey
              ? <button className="btn-sm btn-primary" onClick={analyze} disabled={loading || (!text.trim() && files.length===0)}>
                  {loading ? '⏳ Аналіз...' : '🔍 Аналізувати'}
                </button>
              : <span style={{fontSize:11,color:'var(--orange)'}}>⚠️ Додайте API Key в Аналіз системи</span>
          )}
          {result && <button className="btn-sm btn-ghost" onClick={onClose}>Готово</button>}
        </div>
      </div>
    </div>
  );
}

// ── USAGE LOGGER ─────────────────────────────────────────────────────────────
const usageLog = {
  log(action, meta = {}) {
    try {
      const logs = JSON.parse(localStorage.getItem('levytskyi_usage') || '[]');
      logs.push({ action, meta, ts: new Date().toISOString() });
      // Keep last 500 entries
      if (logs.length > 500) logs.splice(0, logs.length - 500);
      localStorage.setItem('levytskyi_usage', JSON.stringify(logs));
    } catch(e) {}
  },
  getStats() {
    try {
      const logs = JSON.parse(localStorage.getItem('levytskyi_usage') || '[]');
      const counts = {};
      logs.forEach(l => { counts[l.action] = (counts[l.action] || 0) + 1; });
      return { total: logs.length, counts, logs };
    } catch(e) { return { total: 0, counts: {}, logs: [] }; }
  },
  getIdeas() {
    try { return JSON.parse(localStorage.getItem('levytskyi_ideas') || '[]'); }
    catch(e) { return []; }
  },
  saveIdea(text) {
    try {
      const ideas = this.getIdeas();
      ideas.push({ text, ts: new Date().toISOString() });
      localStorage.setItem('levytskyi_ideas', JSON.stringify(ideas));
    } catch(e) {}
  }
};

// ── GOOGLE DRIVE SERVICE ──────────────────────────────────────────────────────
const GOOGLE_CLIENT_ID = '73468500916-sn02gdk7qvp40q04hdjj44g5pir48btb.apps.googleusercontent.com'; // Replace with your Google Cloud Console Client ID
const DRIVE_SCOPE = 'https://www.googleapis.com/auth/drive.file';
const DRIVE_FILE_NAME = 'registry_data.json';

const driveService = {
  _fileId: null,

  isConnected() { return !!localStorage.getItem('levytskyi_drive_token'); },
  getToken()    { return localStorage.getItem('levytskyi_drive_token'); },
  saveToken(t)  { localStorage.setItem('levytskyi_drive_token', t); },
  clearToken()  { localStorage.removeItem('levytskyi_drive_token'); this._fileId = null; },

  authorize() {
    return new Promise((resolve, reject) => {
      if (!window.google) { reject(new Error('Google API не завантажено')); return; }
      const client = google.accounts.oauth2.initTokenClient({
        client_id: GOOGLE_CLIENT_ID,
        scope: DRIVE_SCOPE,
        callback: (resp) => {
          if (resp.error) { reject(new Error(resp.error)); return; }
          this.saveToken(resp.access_token);
          resolve(resp.access_token);
        }
      });
      client.requestAccessToken();
    });
  },

  async _findFileId(token) {
    if (this._fileId) return this._fileId;
    const res = await fetch(
      `https://www.googleapis.com/drive/v3/files?q=name='${DRIVE_FILE_NAME}'+and+trashed=false&fields=files(id)`,
      { headers: { Authorization: `Bearer ${token}` } }
    );
    const data = await res.json();
    if (data.files && data.files.length > 0) { this._fileId = data.files[0].id; }
    return this._fileId || null;
  },

  async readCases(token) {
    const id = await this._findFileId(token);
    if (!id) return null;
    const res = await fetch(
      `https://www.googleapis.com/drive/v3/files/${id}?alt=media`,
      { headers: { Authorization: `Bearer ${token}` } }
    );
    if (!res.ok) return null;
    return await res.json();
  },

  async writeCases(token, cases) {
    const body = JSON.stringify(cases);
    const id = await this._findFileId(token);
    if (id) {
      await fetch(`https://www.googleapis.com/upload/drive/v3/files/${id}?uploadType=media`, {
        method: 'PATCH',
        headers: { Authorization: `Bearer ${token}`, 'Content-Type': 'application/json' },
        body
      });
    } else {
      const form = new FormData();
      form.append('metadata', new Blob([JSON.stringify({ name: DRIVE_FILE_NAME, mimeType: 'application/json' })], { type: 'application/json' }));
      form.append('file', new Blob([body], { type: 'application/json' }));
      const res = await fetch('https://www.googleapis.com/upload/drive/v3/files?uploadType=multipart', {
        method: 'POST',
        headers: { Authorization: `Bearer ${token}` },
        body: form
      });
      const created = await res.json();
      this._fileId = created.id;
    }
  }
};

        if (Array.isArray(parsed) && parsed.length > 0) return parsed;
      }
    } catch(e) {}
    return INITIAL_CASES;
  });
  const [lastSaved, setLastSaved] = useState(null);

  const [driveSyncStatus, setDriveSyncStatus] = useState('idle');

  const [showQI, setShowQI] = useState(false);

  const [search, setSearch] = useState('');
  const [filterCat, setFilterCat] = useState('all');
  const [filterStatus, setFilterStatus] = useState('active');

  // Load from Drive on mount if connected
  React.useEffect(() => {
    if (!driveConnected) return;
    const token = driveService.getToken();
    if (!token) return;
    driveService.readCases(token).then(driveCases => {
      if (driveCases && Array.isArray(driveCases) && driveCases.length > 0) {
        setCases(driveCases);
      }
    }).catch(() => {});
  }, []); // eslint-disable-line

  // Auto-save to localStorage (always) and Drive (if connected)
  React.useEffect(() => {
    try {
      localStorage.setItem('levytskyi_cases', JSON.stringify(cases));
      setLastSaved(new Date().toLocaleTimeString('uk-UA', {hour:'2-digit', minute:'2-digit'}));
    } catch(e) {}
    if (driveConnected) {
      const token = driveService.getToken();
      if (token) {
        setDriveSyncStatus('syncing');
        driveService.writeCases(token, cases)
          .then(() => setDriveSyncStatus('synced'))
          .catch(() => setDriveSyncStatus('error'));
      }
    }
  }, [cases]);

  const hotCases = useMemo(() => cases
    .filter(c => c.status==='active' && (c.deadline || c.hearing_date))
    .map(c => ({
      ...c,
      minDays: Math.min(
        c.deadline ? (daysUntil(c.deadline) ?? 999) : 999,
        c.hearing_date ? (daysUntil(c.hearing_date) ?? 999) : 999
      )
    }))
    .filter(c => c.minDays <= 14)
    .sort((a,b) => a.minDays - b.minDays)
    .slice(0, 8),
  [cases]);

  const filteredCases = useMemo(() => cases.filter(c => {
    const s = search.toLowerCase();
    const matchSearch = !s || c.name.toLowerCase().includes(s) || c.client.toLowerCase().includes(s) || c.court.toLowerCase().includes(s);
    const matchCat = filterCat==='all' || c.category===filterCat;
    const matchStatus = filterStatus==='all' || c.status===filterStatus;
    return matchSearch && matchCat && matchStatus;
  }), [cases, search, filterCat, filterStatus]);

  const stats = useMemo(() => ({
    total: cases.filter(c=>c.status==='active').length,
    hot: cases.filter(c=>c.deadline && daysUntil(c.deadline)!==null && daysUntil(c.deadline)<=3).length,
    thisWeek: cases.filter(c=>c.hearing_date && daysUntil(c.hearing_date)!==null && daysUntil(c.hearing_date)>=0 && daysUntil(c.hearing_date)<=7).length,
    noDeadline: cases.filter(c=>c.status==='active'&&!c.deadline&&!c.hearing_date).length,
  }), [cases]);

  const statusCounts = useMemo(() => ({
    active: cases.filter(c=>c.status==='active').length,
    paused: cases.filter(c=>c.status==='paused').length,
    closed: cases.filter(c=>c.status==='closed').length,
    total: cases.length,
  }), [cases]);

  const addCase = (form) => {
    usageLog.log('case_added', {name: form.name});
    const newCase = { ...form, id: Date.now() };
    setCases(prev => [...prev, newCase]);
    setShowAdd(false);
    setTab('cases');
  };

  const updateCase = (form) => {
    setCases(prev => prev.map(c => c.id === form.id ? { ...form } : c));
    setEditingCase(null);
    setSelected({ ...form });
    setTab('cases');
  };

  const handleEdit = (c) => {
    setSelected(null);
    setEditingCase(c);
    setTab('add');
  };

  const deleteCase = (id) => {
    setCases(prev => prev.filter(c => c.id !== id));
    setSelected(null);
  };

  return (
    <div className="app">
      {/* TOPBAR */}
      <div className="topbar">
        <div className="topbar-logo">АБ <span>Левицького</span></div>
        <div className="topbar-right" style={{display:'flex',gap:8,alignItems:'center'}}>
          {lastSaved && <span style={{fontSize:10,color:'var(--text3)',letterSpacing:'0.04em'}}>збережено {lastSaved}</span>}
          <button className="btn-sm btn-ghost" onClick={() => setShowQI(true)} style={{fontSize:12}}>
            ⚡ Quick Input
          </button>
          <button className="btn-sm btn-ghost" onClick={() => {
            if(confirm('Скинути всі дані і повернути тестові справи?')) {
              localStorage.removeItem('levytskyi_cases');
              setCases(INITIAL_CASES);
            }
          }} style={{fontSize:11,opacity:0.5}} title="Скинути дані">↺</button>
        </div>
      </div>

      {/* NAV */}
      <div className="nav">
        {[
          {id:'dashboard', label:'📊 Дашборд'},
          {id:'cases',     label:`📁 Справи (${cases.filter(c=>c.status==='active').length})`},
          {id:'add',       label:'➕ Нова справа'},
          {id:'analysis',  label:'🔍 Аналіз системи'},
        ].map(t => (
          <button key={t.id} className={`nav-tab${tab===t.id?' active':''}`} onClick={() => { if (t.id !== 'add') setEditingCase(null); setTab(t.id); }}>
            {t.label}
          </button>
        ))}
      </div>

      {/* MAIN */}
      <div className="main">

        {/* ── DASHBOARD ── */}
        {tab === 'dashboard' && (
          <div>
            {hotCases.length > 0 && stats.hot > 0 && (
              <div className="urgency-banner">
                <span className="urgency-banner-icon">🔴</span>
                <span><strong>{stats.hot} справ</strong> з дедлайном найближчі 3 дні</span>
              </div>
            )}
            <div className="stats-row">
              <div className="stat-chip blue"><div className="stat-chip-val">{stats.total}</div><div className="stat-chip-label">Активних справ</div></div>
              <div className="stat-chip red"><div className="stat-chip-val">{stats.hot}</div><div className="stat-chip-label">Горять (≤3 дні)</div></div>
              <div className="stat-chip orange"><div className="stat-chip-val">{stats.thisWeek}</div><div className="stat-chip-label">Засідань цього тижня</div></div>
              <div className="stat-chip green"><div className="stat-chip-val">{stats.noDeadline}</div><div className="stat-chip-label">Без дедлайну</div></div>
            </div>

            <div className="dash-grid">
              <div>
                <div className="section-title">Гарячі справи</div>
                {hotCases.length === 0 && <div className="empty"><div className="empty-icon">✅</div><div className="empty-text">Немає термінових справ</div></div>}
                {hotCases.map(c => (
                  <div key={c.id} className="hot-case" onClick={() => setSelected(c)}>
                    <div className="hot-case-dot" style={{background: c.category==='civil'?'var(--accent)':c.category==='criminal'?'var(--red)':c.category==='military'?'var(--orange)':'var(--green)'}} />
                    <div style={{flex:1}}>
                      <div className="hot-case-name">{c.name}</div>
                      <div className="hot-case-meta">{c.next_action}</div>
                    </div>
                    <span className={`hot-case-days ${daysChipClass(c.minDays)}`}>{daysLabel(c.minDays)}</span>
                  </div>
                ))}
              </div>
              <div>
                <div className="section-title">Календар</div>
                <Calendar cases={cases} onSelectCase={setSelected} />
              </div>
            </div>
          </div>
        )}

        {/* ── CASES ── */}
        {tab === 'cases' && (
          <div>
            <div style={{fontSize:11,color:'var(--text2)',marginBottom:10,display:'flex',gap:14,flexWrap:'wrap',alignItems:'center'}}>
              <span>Активні: <strong style={{color:'var(--green)'}}>{statusCounts.active}</strong></span>
              <span style={{color:'var(--text3)'}}>|</span>
              <span>Призупинені: <strong style={{color:'var(--text2)'}}>{statusCounts.paused}</strong></span>
              <span style={{color:'var(--text3)'}}>|</span>
              <span>Закриті: <strong style={{color:'var(--text3)'}}>{statusCounts.closed}</strong></span>
            </div>
            <div className="cases-toolbar">
              <div className="search-box">
                <span style={{color:'var(--text3)'}}>🔍</span>
                <input placeholder="Пошук за назвою, клієнтом, судом..." value={search} onChange={e=>setSearch(e.target.value)} />
              </div>
              {['all','civil','criminal','military','admin'].map(cat => (
                <button key={cat} className={`filter-btn${filterCat===cat?' active':''}`} onClick={()=>setFilterCat(cat)}>
                  {cat==='all'?'Всі':CAT_LABELS[cat]}
                </button>
              ))}
            </div>
            <div style={{display:'flex',gap:6,marginBottom:12,flexWrap:'wrap'}}>
              <button className={`filter-btn${filterStatus==='active'?' active':''}`} onClick={()=>setFilterStatus('active')}>
                Активні ({statusCounts.active})
              </button>
              <button className={`filter-btn${filterStatus==='paused'?' active':''}`} onClick={()=>setFilterStatus('paused')}>
                Призупинені ({statusCounts.paused})
              </button>
              <button className={`filter-btn${filterStatus==='closed'?' active':''}`} onClick={()=>setFilterStatus('closed')}>
                Закриті ({statusCounts.closed})
              </button>
              <button className={`filter-btn${filterStatus==='all'?' active':''}`} onClick={()=>setFilterStatus('all')}>
                Всі ({statusCounts.total})
              </button>
            </div>
            <div style={{fontSize:12,color:'var(--text2)',marginBottom:12}}>{filteredCases.length} справ</div>
            {filteredCases.length === 0 && <div className="empty"><div className="empty-icon">🔍</div><div className="empty-text">Нічого не знайдено</div></div>}
            <div className="cases-grid">
              {filteredCases.map(c => <CaseCard key={c.id} c={c} onClick={setSelected} />)}
            </div>
          </div>
        )}

        {/* ── ADD CASE ── */}
        {tab === 'add' && (
          <AddCaseForm
            onSave={editingCase ? updateCase : addCase}
            onCancel={() => { setEditingCase(null); setTab('cases'); }}
            initialData={editingCase}
          />
        )}

        {/* ── ANALYSIS ── */}
        {tab === 'analysis' && (
          <AnalysisPanel cases={cases} setCases={setCases} driveConnected={driveConnected} setDriveConnected={setDriveConnected} driveSyncStatus={driveSyncStatus} />
        )}

      </div>

      {/* MODALS */}
      {selected && <CaseModal c={selected} onClose={() => setSelected(null)} onEdit={handleEdit} onDelete={deleteCase} />}
      {showQI && <QuickInput cases={cases} setCases={setCases} onClose={() => setShowQI(false)} />}

      {/* FAB */}
      <button className="fab" onClick={() => setShowQI(true)} title="Quick Input">⚡</button>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
